name: Troubleshooting
description: 문제 발생 원인과 해결 과정을 기록합니다.
title: "[Troubleshooting] YYYY-MM-DD - "
labels: ["troubleshooting"]

body:
  - type: input
    id: problem-summary
    attributes:
      label: 문제 요약
      placeholder: 예) API 토큰 인증 오류
    validations:
      required: true

  - type: input
    id: occurred-date
    attributes:
      label: 발생 날짜
      placeholder: 예) 2026-05-25
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 발생 영역
      options:
        - Backend
        - Frontend
        - AI/RAG
        - Infra
        - Database
        - GitHub
        - 기타
    validations:
      required: true

  - type: textarea
    id: error-content
    attributes:
      label: 에러 내용
      description: 발생한 에러 메시지, 로그, 화면 증상 등을 작성해주세요.
      placeholder: |
        로그인 후 API 요청 시 401 Unauthorized 오류 발생
    validations:
      required: true

  - type: textarea
    id: cause-analysis
    attributes:
      label: 원인 분석
      description: 문제의 원인을 어떻게 분석했는지 작성해주세요.
      placeholder: |
        - 서버에는 토큰 검증 로직이 존재함
        - 클라이언트에서 Authorization 헤더를 누락함
        - 요청 인터셉터 설정이 적용되지 않았음
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 해결 방법
      description: 실제로 적용한 해결 방법을 작성해주세요.
      placeholder: |
        - axios 인스턴스에 Authorization 기본 헤더 설정 추가
        - 로그인 성공 시 accessToken 저장 로직 수정
    validations:
      required: true

  - type: textarea
    id: prevention
    attributes:
      label: 재발 방지 방법
      description: 같은 문제가 다시 발생하지 않도록 어떤 조치를 할 수 있는지 작성해주세요.
      placeholder: |
        - API 요청 인터셉터 테스트 추가
        - 인증 실패 시 공통 에러 처리 로직 추가
        - 요청 헤더 로깅 추가

  - type: textarea
    id: learned
    attributes:
      label: 학습한 점
      placeholder: |
        - JWT 인증 요청에서는 Authorization 헤더 누락 여부를 먼저 확인해야 한다.
        - 클라이언트와 서버의 인증 책임을 명확히 분리해야 한다.

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      placeholder: |
        - 관련 PR
        - 공식 문서
        - 참고 블로그
